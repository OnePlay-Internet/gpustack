# GPUStack with SHARED external MySQL. Grafana + Prometheus are conditional:
#   - .env WITHOUT GRAFANA_URL  -> builtin Grafana/Prometheus run in this container
#   - .env WITH    GRAFANA_URL  -> use that shared Grafana, builtin skipped
# DB always lives on the remote host, so pruning/recreating this container never
# loses DB data. Builtin observability data lives in the gpustack-data volume.
#
# Usage:
#   cp .env.shared-infra.example .env
#   # edit .env with your remote host IP + creds (leave GRAFANA_URL empty for builtin)
#   docker compose -f docker-compose.shared-infra.yaml --env-file .env up -d
#
# Verify gating in source:
#   - builtin postgres skipped: gpustack/cmd/prerun.py:87  (if not cfg.database_url)
#   - empty GRAFANA_URL coerced to None: gpustack/config/config.py:278
#   - use_builtin_grafana True when grafana_url is None: gpustack/cmd/prerun.py

services:
  gpustack-server:
    image: ${IMAGE_REGISTRY:-docker.io}/${IMAGE_NAMESPACE:-gpustack}/gpustack:${GPUSTACK_TAG:-latest}
    container_name: gpustack-server
    restart: unless-stopped
    # Resolve host.docker.internal -> host machine (needed when MySQL runs on the
    # host OS, not in a container). DB_HOST=host.docker.internal in .env.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # --- Shared DB (disables builtin Postgres) ---
      - GPUSTACK_DATABASE_URL=${DB_SCHEME:-mysql}://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      # --- Observability ---
      # GRAFANA_URL empty/unset -> coerced to None -> builtin Grafana+Prometheus run.
      # GRAFANA_URL set         -> use that shared Grafana, builtin skipped.
      - GPUSTACK_GRAFANA_URL=${GRAFANA_URL}
      - GPUSTACK_GRAFANA_WORKER_DASHBOARD_UID=${GRAFANA_WORKER_DASHBOARD_UID:-gpustack-worker}
      - GPUSTACK_GRAFANA_MODEL_DASHBOARD_UID=${GRAFANA_MODEL_DASHBOARD_UID:-gpustack-model}
      # --- Admin bootstrap (first init only) ---
      - GPUSTACK_BOOTSTRAP_PASSWORD=${BOOTSTRAP_PASSWORD:-admin}
    volumes:
      # Only runtime files / model cache. NOT the database. Safe to prune.
      - gpustack-data:/var/lib/gpustack
    ports:
      - "80:80"
      # Worker metrics endpoint (builtin Prometheus scrapes this).
      - "10161:10161"
      # Builtin Grafana UI (only serves when GRAFANA_URL unset). Default port 13000.
      - "13000:13000"
      # Builtin Prometheus (only serves when GRAFANA_URL unset). Default port 19090.
      - "19090:19090"

volumes:
  gpustack-data: {}
